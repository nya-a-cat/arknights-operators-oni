name: Develop validation

on:
  push:
    branches:
      - develop
      - main
  schedule:
    # GitHub cron uses UTC. 18:37 UTC is 02:37 Asia/Shanghai the next day.
    - cron: '37 18 * * *'
  workflow_dispatch:
    inputs:
      run_prts_integration:
        description: Run the live PRTS integration check against develop
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'schedule' && 'nightly-prts' || format('develop-validation-{0}', github.ref) }}
  cancel-in-progress: true

env:
  MOD_ROOT: arknights_oni_mod_work/ArknightsOperatorsMod
  NEWTONSOFT_NUPKG_URL: https://api.nuget.org/v3-flatcontainer/newtonsoft.json/7.0.1/newtonsoft.json.7.0.1.nupkg
  # Size and SHA-512 are published by the official NuGet catalog entry for 7.0.1.
  NEWTONSOFT_NUPKG_SIZE: 1372605
  NEWTONSOFT_NUPKG_SHA512_BASE64: pAGHg015L10Zi3fHyK4PVmII65s2LfZ/Z71VlnhP0df0XJdyeu4QWs3E7XTCAgyvkw5yKDqhvG4iauG0eV+I7A==
  # SHA-256 was calculated from those exact 1,372,605 official package bytes.
  NEWTONSOFT_NUPKG_SHA256: 2112548f1d77b566ec53c19d22eefcfa103c29297116e29889c5bc55cad75b5c

jobs:
  release-source:
    name: release-source
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Validate release branches
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ "$BRANCH_NAME" != "develop" && "$BRANCH_NAME" != "main" ]]; then
            echo "Validation pushes must target develop or main; received '$BRANCH_NAME'." >&2
            exit 1
          fi
          echo "Release source policy satisfied."

  offline-tests:
    name: offline-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install the minimal Mono test toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            ca-certificates-mono \
            libmono-system-data4.0-cil \
            libmono-system-io-compression4.0-cil \
            libmono-system-net-http4.0-cil \
            libmono-system-runtime-serialization4.0-cil \
            libmono-system-xml-linq4.0-cil \
            mono-mcs \
            mono-runtime

      - name: Restore the pinned Json.NET test dependency
        shell: bash
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/newtonsoft.json.7.0.1.nupkg"
          managed="$RUNNER_TEMP/oni-managed"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --max-filesize "$NEWTONSOFT_NUPKG_SIZE" \
            --output "$package" "$NEWTONSOFT_NUPKG_URL"
          test "$(stat --format='%s' "$package")" = "$NEWTONSOFT_NUPKG_SIZE"
          actual_sha512="$(openssl dgst -sha512 -binary "$package" | base64 --wrap=0)"
          test "$actual_sha512" = "$NEWTONSOFT_NUPKG_SHA512_BASE64"
          printf '%s  %s\n' "$NEWTONSOFT_NUPKG_SHA256" "$package" | sha256sum --check --strict
          mkdir -p "$managed"
          python3 - "$package" "$managed/Newtonsoft.Json.dll" <<'PY'
          import pathlib
          import shutil
          import sys
          import zipfile

          package = pathlib.Path(sys.argv[1])
          destination = pathlib.Path(sys.argv[2])
          with zipfile.ZipFile(package) as archive:
              with archive.open("lib/net45/Newtonsoft.Json.dll") as source:
                  with destination.open("wb") as output:
                      shutil.copyfileobj(source, output)
          PY

      - name: Run deterministic tests
        shell: bash
        env:
          ONI_MANAGED_DIR: ${{ runner.temp }}/oni-managed
        run: |
          set -euo pipefail
          bash "$MOD_ROOT/tests/run_operator_animation_mapper_tests.sh"
          bash "$MOD_ROOT/tests/run_mod_localization_tests.sh"
          bash "$MOD_ROOT/tests/run_mod_config_tests.sh"
          bash "$MOD_ROOT/tests/run_operator_appearance_catalog_tests.sh"
          python3 "$MOD_ROOT/tests/test_operator_catalog_thumbnails.py"
          bash "$MOD_ROOT/tests/run_operator_thumbnail_loader_tests.sh"
          bash "$MOD_ROOT/tests/run_resource_index_tests.sh"
          python3 "$MOD_ROOT/tests/test_fallback_release_builder.py"
          bash "$MOD_ROOT/tests/run_operator_fallback_tests.sh"

      - name: Verify tests did not modify the checkout
        shell: bash
        run: |
          set -euo pipefail
          changes="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$changes" ]]; then
            printf '%s\n' "$changes" >&2
            exit 1
          fi

  package-identity:
    name: package-identity
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Validate Stable, Dev, and RC identities
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & ./tools/test_packaging_channels.ps1

      - name: Verify identity probes did not modify the checkout
        shell: bash
        run: |
          set -euo pipefail
          changes="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$changes" ]]; then
            printf '%s\n' "$changes" >&2
            exit 1
          fi

  prts-integration:
    name: prts-integration
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_prts_integration)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out develop
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: develop
          persist-credentials: false

      - name: Install the minimal Mono test toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            ca-certificates-mono \
            libmono-system-io-compression4.0-cil \
            libmono-system-net-http4.0-cil \
            libmono-system-runtime-serialization4.0-cil \
            mono-mcs \
            mono-runtime

      - name: Restore the pinned Json.NET test dependency
        shell: bash
        run: |
          set -euo pipefail
          package="$RUNNER_TEMP/newtonsoft.json.7.0.1.nupkg"
          managed="$RUNNER_TEMP/oni-managed"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --max-filesize "$NEWTONSOFT_NUPKG_SIZE" \
            --output "$package" "$NEWTONSOFT_NUPKG_URL"
          test "$(stat --format='%s' "$package")" = "$NEWTONSOFT_NUPKG_SIZE"
          actual_sha512="$(openssl dgst -sha512 -binary "$package" | base64 --wrap=0)"
          test "$actual_sha512" = "$NEWTONSOFT_NUPKG_SHA512_BASE64"
          printf '%s  %s\n' "$NEWTONSOFT_NUPKG_SHA256" "$package" | sha256sum --check --strict
          mkdir -p "$managed"
          python3 - "$package" "$managed/Newtonsoft.Json.dll" <<'PY'
          import pathlib
          import shutil
          import sys
          import zipfile

          package = pathlib.Path(sys.argv[1])
          destination = pathlib.Path(sys.argv[2])
          with zipfile.ZipFile(package) as archive:
              with archive.open("lib/net45/Newtonsoft.Json.dll") as source:
                  with destination.open("wb") as output:
                      shutil.copyfileobj(source, output)
          PY

      - name: Run the small live PRTS integration check
        id: integration
        shell: bash
        env:
          ONI_MANAGED_DIR: ${{ runner.temp }}/oni-managed
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/prts-integration-report.txt"
          {
            echo "workflow_run_id=$GITHUB_RUN_ID"
            echo "develop_sha=$(git rev-parse HEAD)"
            echo "started_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            bash "$MOD_ROOT/tests/run_operator_asset_resolver_integration.sh"
            echo "finished_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } 2>&1 | tee "$report"

      - name: Verify the integration test did not modify the checkout
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          changes="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$changes" ]]; then
            printf '%s\n' "$changes" >&2
            exit 1
          fi

      - name: Upload the text report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prts-integration-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/prts-integration-report.txt
          if-no-files-found: error
          retention-days: 7
          compression-level: 9
          overwrite: false
